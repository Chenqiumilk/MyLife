<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diary Focus Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="Diary Focus web preview">
      <section class="screen" id="home-screen">
        <header class="top-bar">
          <div class="menu-wrap">
            <button class="icon-button menu-button" id="menu-button" aria-label="Open menu" aria-expanded="false">
              <svg class="home-icon" viewBox="0 0 48 48" aria-hidden="true">
                <path class="home-roof" d="M8 24 L24 10 L40 24" />
                <path class="home-body" d="M13 22 Q13 20 15 20 H33 Q35 20 35 22 V38 Q35 40 33 40 H15 Q13 40 13 38 Z" />
                <path class="home-door" d="M22 40 V31 Q22 28 24 28 Q26 28 26 31 V40" />
                <path class="home-face" d="M19 28 H19.1 M29 28 H29.1 M21 33 Q24 35 27 33" />
                <path class="home-heart" d="M33 14 C31 11 27 13 29 17 C31 19 33 20 33 20 C33 20 35 19 37 17 C39 13 35 11 33 14 Z" />
              </svg>
              <span class="chevron"></span>
            </button>
            <nav class="menu" id="menu">
              <button data-route="home">Diary</button>
              <button data-route="book">Book</button>
              <button data-route="movie">Movie</button>
              <button data-route="focus">Focus</button>
            </nav>
          </div>
          <button class="icon-button gear-button" id="settings-button" aria-label="Open settings"></button>
        </header>

        <section class="home-view view active" data-view="home">
          <div class="month-title">
            <p id="year-label"></p>
            <h1 id="month-label"></h1>
          </div>
          <div class="calendar-grid" id="calendar-grid" aria-label="Month calendar"></div>
          <button class="add-button" id="add-entry" aria-label="Add diary entry">+</button>
        </section>

        <section class="review-view view" data-view="book">
          <div class="review-heading">
            <span class="book-mark"></span>
            <h2>Book review</h2>
          </div>
          <form class="search-row" data-search="book">
            <input class="soft-input" id="book-search" placeholder="Search book title" />
            <button type="submit">Search</button>
          </form>
          <div class="result-options" id="book-results"></div>
          <div class="selected-media" id="book-selected"></div>
          <section class="review-editor" id="book-review-editor">
            <textarea class="soft-textarea" id="book-review-text" placeholder="Thoughts, favorite lines, rating..."></textarea>
            <button class="save-review-button" id="save-book-review" type="button" aria-label="Save book review">
              <span class="save-icon"></span>
              Save to library
            </button>
          </section>
          <section class="review-library" id="book-library" aria-label="Book review library"></section>
        </section>

        <section class="review-view view" data-view="movie">
          <div class="review-heading">
            <span class="movie-mark"></span>
            <h2>Movie review</h2>
          </div>
          <form class="search-row" data-search="movie">
            <input class="soft-input" id="movie-search" placeholder="Search movie title" />
            <button type="submit">Search</button>
          </form>
          <div class="result-options" id="movie-results"></div>
          <div class="selected-media" id="movie-selected"></div>
          <textarea class="soft-textarea" placeholder="Scenes, feeling, rating..."></textarea>
        </section>

        <section class="focus-view view" data-view="focus">
          <input id="focus-bg-input" type="file" accept="image/*" hidden />
          <div class="focus-bg" id="focus-bg"></div>
          <div class="focus-content">
            <div class="focus-room" aria-label="Cozy focus room">
              <div class="pet-stage">
                <div class="companion dog-companion" id="focus-pet" aria-label="Focus companion"></div>
              </div>
            </div>
            <p class="focus-time" id="focus-time">25:00</p>
            <div class="focus-panel">
              <div class="room-picker" aria-label="Choose focus room">
                <button class="room-choice selected" data-room="1" type="button" aria-label="Room background 1"></button>
                <button class="room-choice" data-room="2" type="button" aria-label="Room background 2"></button>
                <button class="room-choice" data-room="3" type="button" aria-label="Room background 3"></button>
                <button class="room-choice" data-room="4" type="button" aria-label="Room background 4"></button>
              </div>
              <div class="pet-picker" aria-label="Choose focus companion">
                <button class="pet-choice selected" data-pet="dog" type="button">Dog</button>
                <button class="pet-choice" data-pet="cat" type="button">Cat</button>
                <button class="pet-choice" data-pet="sheep" type="button">Sheep</button>
                <button class="pet-choice" data-pet="pig" type="button">Pig</button>
              </div>
              <label class="range-row">
                <span class="clock-small"></span>
                <input id="focus-minutes" type="range" min="5" max="120" step="5" value="25" />
                <output id="focus-minutes-label">25m</output>
              </label>
              <div class="focus-actions">
                <button class="square-button image-button" id="focus-bg-button" aria-label="Choose focus background"></button>
                <button class="square-button landscape-button" id="landscape-focus" aria-label="Toggle landscape focus" hidden></button>
                <button class="start-button" id="start-focus">Start</button>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <dialog class="sheet diary-sheet" id="diary-dialog">
      <form method="dialog" class="sheet-inner">
        <header class="sheet-header">
          <h2 id="diary-date">Diary</h2>
          <button class="text-button">Done</button>
        </header>

        <section class="mood-picker" aria-label="Mood picker">
          <h3>Mood</h3>
          <div class="mood-options" id="mood-options"></div>
        </section>

        <input id="diary-photo-input" type="file" accept="image/*" multiple hidden />
        <button class="photo-upload" id="photo-upload-button" type="button">
          <span class="image-label" id="photo-upload-label">Add pictures</span>
        </button>
        <div class="photo-frame" id="photo-frame"></div>
        <section class="focus-summary" id="focus-summary"></section>

        <section class="diary-writing">
          <div class="diary-toolbar">
            <button type="button" class="clock-button" id="mark-time" aria-label="Mark current time"></button>
          </div>
          <div class="diary-editor" id="diary-editor" contenteditable="true" data-placeholder="Dear today..."></div>
        </section>

        <section class="todo-box">
          <header>
            <button type="button" class="todo-icon" id="add-todo-button" aria-label="Add todo item"></button>
            <h3>Todo</h3>
          </header>
          <div class="todo-input-row" id="todo-input-row">
            <input id="todo-text" placeholder="Add an item for this day" />
            <button type="button" id="save-todo">Add</button>
          </div>
          <div class="todo-list" id="todo-list"></div>
        </section>
      </form>
    </dialog>

    <dialog class="sheet settings-sheet" id="settings-dialog">
      <form method="dialog" class="sheet-inner">
        <header class="sheet-header">
          <h2>Settings</h2>
          <button class="text-button">Done</button>
        </header>
        <label class="setting-row">Font <select><option>Rounded</option><option>Serif</option><option>Simple</option></select></label>
        <label class="setting-row">Notifications <input type="checkbox" checked /></label>
        <label class="setting-row">Lock screen <input type="checkbox" /></label>
        <label class="setting-row">Dark mode <input type="checkbox" /></label>
        <button type="button" class="setting-row backup-row">Backup <span>Cloud</span></button>
        <label class="setting-row">Language <select><option>English</option><option>Chinese</option><option>French</option></select></label>
        <div class="price-box">
          <strong>Free trial: 28 days</strong>
          <span>Pay once, use app forever.</span>
          <b>CAD 1.99</b>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
